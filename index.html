<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>현장톡</title>
<meta name="description" content="건설현장 카카오톡 메시지 관리">
<meta name="theme-color" content="#1a2332">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="현장톡">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f2ee;--surface:#faf9f7;--card:#ffffff;--primary:#1a2332;--primary2:#263448;--accent:#b8732e;
  --border:#e8e4de;--border2:#ddd8d0;--text:#1a2332;--muted:#64748b;--soft:#94a3b8;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 8px 32px rgba(0,0,0,.1);
  --radius:12px;--radius2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* 레이아웃 */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:252px;background:linear-gradient(180deg,#1a2332 0%,#1e2a3d 100%);color:#fff;display:flex;flex-direction:column;flex-shrink:0;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* 사이드바 */
.logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;transition:opacity 0.15s}
.logo:hover{opacity:0.85}
.logo-title{font-size:19px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.nav{flex:1;overflow:auto;padding:14px 10px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-section{margin-bottom:16px}
.nav-label{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1.2px;padding:8px 8px 5px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase}
.nav-collapsible{cursor:pointer;user-select:none;border-radius:6px;transition:background 0.15s}
.nav-collapsible:hover{background:rgba(255,255,255,.06)}
.nav-label small{font-size:10px;color:rgba(255,255,255,.25);font-weight:600;letter-spacing:0;text-transform:none}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;margin-bottom:2px;transition:all 0.15s}
.nav-item:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1)}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.count{margin-left:auto;background:rgba(255,255,255,.15);padding:2px 7px;border-radius:10px;font-size:10px;color:rgba(255,255,255,.9);font-weight:700}
.room-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:13px}
.room-star-btn{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;padding:2px;transition:color 0.15s;flex-shrink:0}
.room-star-btn:hover{color:rgba(255,255,255,.7)}
.room-star-btn.on{color:#f6c453}
.room-actions{display:flex;gap:3px;margin-left:2px}
.room-action-btn{width:22px;height:22px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border-radius:6px;font-size:10px;cursor:pointer;transition:all 0.15s}
.room-action-btn:hover{background:rgba(255,255,255,.15)}
.room-action-btn.wide{width:36px}
.room-archived{opacity:.4}
.room-tools{display:flex;gap:6px;padding:0 10px 10px}
.room-tool-btn{flex:1;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);border-radius:8px;padding:7px 4px;font-size:11px;cursor:pointer;transition:all 0.15s}
.room-tool-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.room-add{margin:0 10px 12px;padding:9px;border:1px dashed rgba(255,255,255,.2);border-radius:9px;color:rgba(255,255,255,.55);background:none;font-size:12px;cursor:pointer;width:calc(100% - 20px);transition:all 0.15s}
.room-add:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.85)}
.side-stat{border-top:1px solid rgba(255,255,255,.08);padding:12px 18px 16px}
.side-stat-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px}
.side-stat-row span:first-child{color:rgba(255,255,255,.4)}
.side-stat-row strong{color:rgba(255,255,255,.85);font-weight:700}

/* 헤더 */
.header{min-height:64px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;flex-wrap:wrap;gap:8px;box-shadow:0 1px 0 var(--border)}
.header-title{font-size:18px;font-weight:900;letter-spacing:-.4px}
.header-sub{font-size:12px;color:var(--soft);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-primary{border:none;background:var(--primary);color:#fff;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn-primary:hover{background:var(--primary2);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.2)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{border:1px solid var(--border2);background:#fff;color:var(--muted);border-radius:9px;padding:9px 13px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:7px 13px;border:1px solid var(--border2);border-radius:8px;background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-sm:hover{border-color:var(--primary);color:var(--primary);background:var(--bg)}

/* 컨텐츠 */
.content{flex:1;overflow:auto;padding:22px 24px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* 대시보드 */
.dashboard-layout{display:grid;grid-template-columns:minmax(0,1.1fr) 370px;gap:20px;align-items:start}
.dashboard-left{min-width:0}
.dashboard-right{position:sticky;top:0}
.dashboard-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;grid-auto-flow:row}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
.summary-card:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
.summary-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.summary-card.missed::before{background:linear-gradient(180deg,#ef4444,#dc2626)}
.summary-card.calendar::before{background:linear-gradient(180deg,#f59e0b,var(--accent))}
.summary-card.todo::before{background:linear-gradient(180deg,#10b981,#0f766e)}
.summary-card.notice::before{background:linear-gradient(180deg,#3b82f6,#1d4ed8)}
.summary-card-icon{font-size:22px;margin-bottom:8px}
.card-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;letter-spacing:.3px}
.card-num{font-size:34px;line-height:1;font-weight:900;letter-spacing:-1px}
.card-hint{font-size:11px;color:var(--soft);margin-top:8px}
.summary-card.missed .card-num{color:#dc2626}
.summary-card.todo .card-num{color:#0f766e}
.summary-card.notice .card-num{color:#1d4ed8}
.summary-card.calendar .card-num{color:var(--accent)}
.dashboard-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-title{font-size:13px;font-weight:900;letter-spacing:-.2px}
.panel-link{font-size:12px;color:var(--accent);font-weight:700;border:none;background:none;cursor:pointer;transition:opacity 0.15s}
.panel-link:hover{opacity:.75}

/* 아이템 */
.item{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius2);padding:12px;margin-bottom:8px;transition:all 0.15s}
.item:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.todo-click{cursor:pointer}
.todo-click.done{opacity:.5}
.item-title{font-size:13px;font-weight:700;line-height:1.5;margin-top:5px;color:var(--text)}
.meta{font-size:11px;color:var(--soft);margin-top:6px;display:flex;gap:6px;align-items:center}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--border2)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px;margin-bottom:4px;letter-spacing:.1px}
.b-blue{background:#dbeafe;color:#1e40af}.b-green{background:#dcfce7;color:#15803d}
.b-orange{background:#ffedd5;color:#c2410c}.b-yellow{background:#fef9c3;color:#854d0e}
.b-pink{background:#fce7f3;color:#9d174d}.b-purple{background:#ede9fe;color:#6d28d9}
.b-gray{background:#f1f5f9;color:#475569}.b-red{background:#fee2e2;color:#b91c1c}
.b-teal{background:#ccfbf1;color:#0f766e}
.empty-box{padding:28px 16px;text-align:center;color:var(--soft);font-size:13px;background:var(--bg);border-radius:var(--radius2);border:1px dashed var(--border2)}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.empty-text{font-weight:500}

/* 검색/필터 */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:12px;font-weight:600;border:1px solid var(--border2);background:var(--card);border-radius:20px;padding:6px 13px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 6px rgba(26,35,50,.3)}
.category-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.category{border-radius:var(--radius);padding:14px 8px;border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow);cursor:pointer;text-align:center;transition:all 0.2s}
.category:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow2)}
.category-icon{font-size:22px;margin-bottom:8px}
.category-num{font-size:22px;font-weight:900;letter-spacing:-1px}
.category-name{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px}
.search-wrap{margin-bottom:14px;position:relative}
.search-input{width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:14px;background:var(--card);color:var(--text);box-shadow:var(--shadow);transition:all 0.15s}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,35,50,.08)}

/* 캘린더 */
.calendar-card{padding:0;overflow:hidden;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.calendar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.calendar-title{font-size:14px;font-weight:900}
.calendar-nav{display:flex;gap:6px}
.calendar-nav button{height:30px;min-width:30px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:13px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px;transition:all 0.15s}
.calendar-nav button:hover{border-color:var(--primary);color:var(--primary)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)}
.day-label{padding:8px 4px;text-align:center;font-size:10px;font-weight:800;color:var(--soft);background:var(--bg);border-right:1px solid var(--border);letter-spacing:.5px}
.day-label:first-child{color:#ef4444}
.cal-cell{min-height:82px;padding:6px;border-right:1px solid var(--border);border-top:1px solid var(--border);background:var(--card);cursor:pointer;transition:background 0.1s;overflow:hidden}
.cal-cell:hover{background:var(--bg)}
.cal-cell:nth-child(7n){border-right:none}
.cal-date{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;min-height:24px;display:flex;align-items:center;gap:2px;white-space:nowrap}
.cal-cell.today .cal-date span:first-child{background:var(--primary);color:#fff;font-weight:900;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.sunday{background:#fff8f8}
.cal-cell.sunday .cal-date{color:#ef4444}
.cal-cell.holiday{background:#fff8f8}
.cal-cell.holiday .cal-date{color:#ef4444}
.holiday-name{font-size:9px;color:#ef4444;font-weight:700;margin-bottom:2px;line-height:1.2}
.cal-event{display:block;font-size:10px;font-weight:700;line-height:1.4;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;position:relative;max-width:100%}
.cal-event:hover::after{content:attr(title);position:absolute;left:0;top:100%;background:#1a2332;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;white-space:normal;width:160px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.2);line-height:1.4;font-weight:600}
.ev-purple{background:#ede9fe;color:#6d28d9}.ev-green{background:#dcfce7;color:#15803d}
.ev-blue{background:#dbeafe;color:#1e40af}.ev-yellow{background:#fef9c3;color:#854d0e}
.ev-red{background:#fee2e2;color:#b91c1c}.ev-gray{background:#f1f5f9;color:#475569}
.calendar-list{padding:14px 16px 16px}
.calendar-list-title{font-size:12px;font-weight:800;margin-bottom:10px;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.mini-schedule{border-left:3px solid var(--accent);background:var(--bg);border-radius:var(--radius2);padding:10px 12px;margin-bottom:8px;transition:all 0.15s}
.mini-schedule:hover{transform:translateX(2px)}
.mini-date{font-size:11px;color:var(--accent);font-weight:800;margin-bottom:3px}
.mini-text{font-size:12px;font-weight:700;line-height:1.4;color:var(--text)}
.full-calendar{max-width:100%}

/* 할일 */
.todo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;box-shadow:var(--shadow);transition:all 0.15s}
.todo-card:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
.todo-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s}
.todo-check.done{background:var(--primary);border-color:var(--primary);color:#fff}
.todo-done-label{font-size:11px;color:var(--soft);margin-left:auto;white-space:nowrap}

/* 입력 */
.input-page{display:grid;grid-template-columns:minmax(0,1fr) minmax(380px,.9fr);gap:18px;align-items:start}
.input-panel,.preview-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.input-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.input-title{font-size:17px;font-weight:900;letter-spacing:-.4px}
.input-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field-label{font-size:12px;font-weight:700;color:var(--muted);display:flex;flex-direction:column;gap:6px}
.field-control{border:1px solid var(--border2);border-radius:var(--radius2);padding:9px 12px;font-size:13px;background:var(--card);color:var(--text);transition:border-color 0.15s}
.field-control:focus{outline:none;border-color:var(--primary)}
.paste-guide{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius2);padding:12px;margin-bottom:14px}
.paste-guide strong{font-size:12px;font-weight:700}
.paste-guide pre{font-family:inherit;white-space:pre-wrap;font-size:11px;color:var(--muted);line-height:1.6;margin-top:6px}
.paste-area{width:100%;min-height:230px;border:1px solid var(--border2);border-radius:var(--radius2);padding:12px;font-size:13px;line-height:1.7;background:var(--card);color:var(--text);resize:vertical;transition:border-color 0.15s}
.paste-area:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,35,50,.06)}
.input-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
.input-count{font-size:12px;color:var(--soft)}
.input-buttons{display:flex;gap:8px}
.input-error{margin-top:10px;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:var(--radius2);padding:10px 12px;font-size:12px;font-weight:700}
.preview-list{display:flex;flex-direction:column;gap:10px}
.preview-card{border:1px solid var(--border);background:var(--bg);border-radius:var(--radius2);padding:14px}
.preview-row{display:grid;grid-template-columns:140px 1fr;gap:8px;margin-bottom:8px}
.preview-top{grid-template-columns:130px 1fr 80px 50px;align-items:center}
.summary-edit{width:100%;margin-bottom:8px;font-weight:700;border:1px solid var(--border2);border-radius:var(--radius2);padding:8px 10px;font-size:13px;background:var(--card)}
.todo-check-label{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:5px}
.remove-btn{border:1px solid #fecaca;color:#b91c1c;background:#fff;border-radius:var(--radius2);padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;width:100%;transition:all 0.15s}
.remove-btn:hover{background:#fee2e2}
.preview-card select,.preview-card input[type=text],.preview-card input[type=date],.preview-card textarea{border:1px solid var(--border2);border-radius:var(--radius2);padding:7px 10px;font-size:12px;background:var(--card);color:var(--text);width:100%}
.preview-card textarea{min-height:60px;resize:vertical}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:16px;padding:26px;width:90%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.modal-input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius2);font-size:14px;margin-bottom:12px;transition:border-color 0.15s}
.modal-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,35,50,.08)}
.modal-actions{display:flex;gap:8px;margin-top:4px}

/* 토스트 */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

/* 직접 일정 */
.cal-cell.has-custom{background:#f0f9ff}
.cal-cell.off-day{background:#fff0f0!important}
.cal-event.custom-ev{background:#dbeafe;color:#1e40af;border-left:2px solid #3b82f6}
.ev-edit-btn{font-size:9px;cursor:pointer;opacity:.6;margin-left:2px}
.ev-edit-btn:hover{opacity:1}

@media(max-width:1280px){.dashboard-layout{grid-template-columns:minmax(0,1fr) 350px}.category-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1024px){.dashboard-summary{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){
  .sidebar{width:200px}
  .dashboard-layout{grid-template-columns:1fr}
  .dashboard-right{position:static}
  .dashboard-grid-2{grid-template-columns:1fr}
  .input-page{grid-template-columns:1fr}
  .content{padding:14px}
  .btn-sm{padding:5px 9px;font-size:11px}
  .btn-primary{padding:8px 12px;font-size:12px}
  .header{padding:0 14px;min-height:56px}

<script>
// ===== Supabase 설정 =====
const SUPABASE_URL = 'https://rjipklyccmwqodgdpbph.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rEkdd8t5kpNsLuf4w3shSQ_itbuxobl';

async function sbFetch(table, method='GET', body=null, query='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : '',
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) { const err = await res.text(); console.error('Supabase error:', err); return null; }
  if (res.status === 204) return true;
  return res.json();
}

async function loadFromSupabase() {
  try {
    const [dbRooms, dbMsgs, dbTodos, dbCustomEvents] = await Promise.all([
      sbFetch('rooms', 'GET', null, '?order=sort_order'),
      sbFetch('messages', 'GET', null, '?order=created_at.desc'),
      sbFetch('todos', 'GET', null, '?order=created_at.desc'),
      sbFetch('custom_events', 'GET', null, '?order=date'),
    ]);
    if (dbRooms) rooms = dbRooms.map(r=>({id:r.id,name:r.name,favorite:r.favorite,archived:r.archived,sortOrder:r.sort_order}));
    if (dbMsgs) messages = dbMsgs.map(m=>({id:m.id,roomName:m.room_name,tag:m.tag,sender:m.sender,summary:m.summary,content:m.content,messageDate:m.message_date,createdAt:m.created_at,isTodo:m.is_todo}));
    if (dbTodos) todos = dbTodos.map(t=>({id:t.id,messageId:t.message_id,title:t.title,tag:t.tag,roomName:t.room_name,dueDate:t.due_date,done:t.done,doneAt:t.done_at}));
    if (dbCustomEvents) customEvents = dbCustomEvents.map(e=>({id:e.id,title:e.title,date:e.date,tag:e.tag,memo:e.memo,createdAt:e.created_at}));
    console.log('✅ Supabase 로드 완료');
    return true;
  } catch(e) { console.error('Supabase 로드 실패:', e); return false; }
}

async function saveToSupabase() {
  try {
    await Promise.all([
      rooms.length ? sbFetch('rooms', 'POST', rooms.map(r=>({id:r.id,name:r.name,favorite:r.favorite,archived:r.archived,sort_order:r.sortOrder})), '') : null,
      messages.length ? sbFetch('messages', 'POST', messages.map(m=>({id:m.id,room_name:m.roomName,tag:m.tag,sender:m.sender,summary:m.summary,content:m.content,message_date:m.messageDate,created_at:m.createdAt,is_todo:m.isTodo})), '') : null,
      todos.length ? sbFetch('todos', 'POST', todos.map(t=>({id:t.id,message_id:t.messageId,title:t.title,tag:t.tag,room_name:t.roomName,due_date:t.dueDate,done:t.done,done_at:t.doneAt||null})), '') : null,
      customEvents.length ? sbFetch('custom_events', 'POST', customEvents.map(e=>({id:e.id,title:e.title,date:e.date,tag:e.tag||'일정',memo:e.memo||'',created_at:e.createdAt||new Date().toISOString()})), '') : null,

// ===== 유틸 =====
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function todayKey() { return dateKey(new Date()); }
function addDaysKey(n) { const d = new Date(); d.setDate(d.getDate()+n); return dateKey(d); }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function formatDate(v) {
  if(!v) return '';
  const d=new Date(v);
  if(isNaN(d)) return v;
  const days=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()} ${days[d.getDay()]}`;
}
function normalizeTag(t) {
  const map={'자재/발주':'자재발주','하자/보수':'하자보수','안전':'안전관리','지시':'지시사항','공지':'공지사항','시공':'시공기준','품질':'품질관리'};
  return map[t]||t||'기타';
}
function tagIcon(t) { return CATEGORIES.find(c=>c.tag===t)?.icon||({공지사항:'📢',기타:'📌'}[t]||'📌'); }
function badgeClass(t) { return BADGE[t]||'b-gray'; }
function evClass(t) { return EV_CLASS[normalizeTag(t)]||'ev-gray'; }
function shortTag(t) {
  return {지시사항:'지시',공지사항:'공지',시공기준:'기준',자재발주:'자재',품질관리:'품질',안전관리:'안전',하자보수:'하자',일정:'일정'}[normalizeTag(t)]||t;
}
function getHoliday(y,m,d) { return KR_HOLIDAYS[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]||null; }

function save() {
  localStorage.setItem('hj3_rooms', JSON.stringify(rooms));
  localStorage.setItem('hj3_msgs', JSON.stringify(messages));
  localStorage.setItem('hj3_todos', JSON.stringify(todos));
  localStorage.setItem('hj3_starred', JSON.stringify(starredRooms));
  localStorage.setItem('hj3_custom_events', JSON.stringify(customEvents));
  localStorage.setItem('hj3_off_days', JSON.stringify(offDays));
  localStorage.setItem('hj3_work_sat', JSON.stringify(workSaturdays));
  localStorage.setItem('hj3_settings', JSON.stringify(appSettings));
  updateStats();
  renderSidebar();
  saveToSupabase().catch(e => console.error(e));
}

function updateStats() {
  const pending = todos.filter(t=>!t.done).length;
  document.getElementById('stat-total').textContent = messages.length+'건';
  document.getElementById('stat-todo').textContent = pending+'건';
}

    .sort((a,b) => Number(b.favorite)-Number(a.favorite)||a.sortOrder-b.sortOrder);

  nav.innerHTML = `
    <div class="nav-section">
      <div class="nav-label">메뉴</div>
      ${navItem('📊','대시보드','dashboard')}
      ${navItem('📅','캘린더','calendar',calEvents.length)}
      ${navItem('✅','할일','todo',pending)}

      ${navItem('⚙️','설정','settings')}
    </div>
    <div class="nav-section">
      <div class="nav-label nav-collapsible" onclick="toggleSection('찾아보기')">
        <span>찾아보기</span>
        <span style="font-size:10px;color:rgba(255,255,255,.4);transition:transform 0.2s;display:inline-block;transform:${sectionCollapsed['찾아보기']?'rotate(-90deg)':'rotate(0deg)'}">▼</span>
      </div>
      ${!sectionCollapsed['찾아보기'] ? CATEGORIES.map(c => navItem(c.icon,c.tag,'cat_'+c.tag,messages.filter(m=>normalizeTag(m.tag)===c.tag).length)).join('') : ''}
    </div>
    <div class="nav-section">
      <div class="nav-label nav-collapsible" onclick="toggleSection('채팅방')">
        <span>채팅방 <small style="letter-spacing:0;text-transform:none;font-weight:500">${editMode?'편집 중':favoriteOnly?'즐겨찾기':''}</small></span>
        <span style="font-size:10px;color:rgba(255,255,255,.4);transition:transform 0.2s;display:inline-block;transform:${sectionCollapsed['채팅방']?'rotate(-90deg)':'rotate(0deg)'}">▼</span>
      </div>
      ${!sectionCollapsed['채팅방'] ? visibleRooms.map(r => `
        <div class="nav-item room-item ${r.archived?'room-archived':''} ${currentView==='room_'+r.id?'active':''}" onclick="openRoom('${r.id}')">
          <span class="nav-icon">💬</span>
          <span class="room-name">${r.name}</span>
          <span class="count">${messages.filter(m=>m.roomName===r.name).length}</span>
          <button class="room-star-btn ${r.favorite?'on':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">${r.favorite?'★':'☆'}</button>
          ${editMode?'<span class="room-actions"><button class="room-action-btn" onclick="event.stopPropagation();moveRoom(\''+r.id+'\',-1)">↑</button><button class="room-action-btn" onclick="event.stopPropagation();moveRoom(\''+r.id+'\',1)">↓</button><button class="room-action-btn wide" onclick="event.stopPropagation();archiveRoom(\''+r.id+'\')">'+(r.archived?'복원':'숨김')+'</button></span>':''}
        </div>`).join('') : ''}
    </div>`;
}

function navItem(icon,label,view,count) {
  const isActive = currentView===view || (view.startsWith('cat_')&&currentView===view);
  return `<div class="nav-item ${isActive?'active':''}" onclick="setView('${view}')">
    <span class="nav-icon">${icon}</span>${label}
    ${typeof count==='number'?`<span class="count">${count}</span>`:''}
  </div>`;
}

function setView(v) {
  currentView = v;
  closeSidebar();
  if(v.startsWith('cat_')) { selectedCategory=v.replace('cat_',''); currentView='search'; }
  const titles = {dashboard:'대시보드',calendar:'캘린더',todo:'할일',search:'검색',input:'메시지 입력',settings:'설정'};
  document.getElementById('header-title').textContent = titles[v]||(v.startsWith('cat_')?v.replace('cat_','')+'  검색':v);
  const guideEl = document.getElementById('header-guide');
  if(guideEl) guideEl.style.display = (currentView==='dashboard') ? 'block' : 'none';
  renderSidebar();
  const el = document.getElementById('main-content');
  if(currentView==='dashboard') renderDashboard(el);
  else if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='todo') renderTodoView(el);
  else if(currentView==='search') renderSearchView(el);
  else if(currentView==='input') renderInputView(el);
  else if(currentView==='settings') renderSettingsView(el);
  else if(currentView.startsWith('room_')) renderRoomView(el,v);
}

function openRoom(id) {
  const room = rooms.find(r=>r.id===id);
  if(!room) return;
  closeSidebar();
  currentView = 'room_'+id;
  document.getElementById('header-title').textContent = room.name;
  renderSidebar();
  renderRoomView(document.getElementById('main-content'), id);
}

function toggleSection(name) {
  sectionCollapsed[name] = !sectionCollapsed[name];
  renderSidebar();
}

function toggleFav(id) { rooms=rooms.map(r=>r.id===id?{...r,favorite:!r.favorite}:r); save(); }
function moveRoom(id,dir) {
  const sorted=[...rooms].sort((a,b)=>a.sortOrder-b.sortOrder);
  const i=sorted.findIndex(r=>r.id===id);
  const j=i+dir;
  if(i<0||j<0||j>=sorted.length) return;
  [sorted[i].sortOrder,sorted[j].sortOrder]=[sorted[j].sortOrder,sorted[i].sortOrder];
  rooms=sorted; save();
}
function archiveRoom(id) { rooms=rooms.map(r=>r.id===id?{...r,archived:!r.archived}:r); save(); }
function toggleEditMode() { editMode=!editMode; renderSidebar(); }
function toggleFavoriteOnly() { favoriteOnly=!favoriteOnly; renderSidebar(); }
function addRoomPrompt() { document.getElementById('room-modal').style.display='flex'; document.getElementById('room-name-input').focus(); }
function closeModal() { document.getElementById('room-modal').style.display='none'; }
function confirmAddRoom() {
  const name=document.getElementById('room-name-input').value.trim();
  if(!name) return;
  rooms.push({id:uid(),name,favorite:false,archived:false,sortOrder:rooms.length+1});
  save(); closeModal();
  document.getElementById('room-name-input').value='';
  showToast('채팅방이 추가됐어요!');
}

function renderDashboard(el) {
  const today = new Date();
  const missedDays = appSettings.missedDays || 1;
  const missedInstr = messages.filter(m=>{
    const d = new Date(m.createdAt);
    const diff = (today - d) / (1000*60*60*24);
    return normalizeTag(m.tag)==='지시사항' && diff >= 0 && diff < missedDays;
  });
  const notices = messages.filter(m=>{
    const d = new Date(m.createdAt);
    const diff = (today - d) / (1000*60*60*24);
    return normalizeTag(m.tag)==='공지사항' && diff >= 0 && diff < 7;
  });
  const calEvents = getCalendarEvents();
  const pending = todos.filter(t=>!t.done);
  const tomorrowTodos = pending.filter(t=>t.dueDate===addDaysKey(1));
  const weekTodos = pending.filter(t=>t.dueDate&&t.dueDate!==addDaysKey(1)&&t.dueDate<=addDaysKey(7));

  const cardMap = {
    missed: `<div class="summary-card missed" onclick="setView('cat_지시사항')"><div class="summary-card-icon">📋</div><div class="card-label">지시사항 (${missedDays===1?'오늘':'최근'+missedDays+'일'})</div><div class="card-num">${missedInstr.length}</div><div class="card-hint">확인 또는 후속 조치 필요</div></div>`,
    calendar: `<div class="summary-card calendar" onclick="setView('calendar')"><div class="summary-card-icon">📅</div><div class="card-label">캘린더 일정</div><div class="card-num">${calEvents.length}</div><div class="card-hint">내일·이번 주 일정 포함</div></div>`,
    todo: `<div class="summary-card todo" onclick="setView('todo')"><div class="summary-card-icon">✅</div><div class="card-label">할일</div><div class="card-num">${pending.length}</div><div class="card-hint">내일 ${tomorrowTodos.length}건 · 이번 주 ${weekTodos.length}건</div></div>`,
    notice: `<div class="summary-card notice" onclick="setView('cat_공지사항')"><div class="summary-card-icon">📢</div><div class="card-label">공지사항</div><div class="card-num">${notices.length}</div><div class="card-hint">회의·전달사항 포함</div></div>`,
  };
  const cards = (appSettings.dashboardCards||['missed','calendar','todo','notice']).map(c=>cardMap[c]||'').join('');

  el.innerHTML = `
    <div class="dashboard-layout">
      <div class="dashboard-left">
        <div class="dashboard-summary">${cards}</div>
        <div class="dashboard-grid-2">
          <div class="panel">
            <div class="panel-head"><div class="panel-title">공지사항</div><button class="panel-link" onclick="setView('cat_공지사항')">전체 →</button></div>
            ${notices.length?notices.slice(0,3).map(m=>msgItem(m)).join(''):'<div class="empty-box">오늘 공지사항이 없습니다.</div>'}
          </div>
          <div class="panel">
            <div class="panel-head"><div class="panel-title">빠른 검색</div><button class="panel-link" onclick="setView('search')">검색 화면 →</button></div>
            <div style="display:flex;gap:8px;margin-bottom:10px;">
              <input id="quick-search-input" style="flex:1;border:1px solid var(--border2);border-radius:9px;padding:9px 10px;font-size:13px;background:#fff;color:var(--text)" placeholder="예: 외벽 줄눈, 방수, PIT, 석재, 감리" onkeydown="if(event.key==='Enter')doQuickSearch()">
              <button class="btn-primary" onclick="doQuickSearch()">검색</button>
            </div>
            <div class="chip-row">
              ${CATEGORIES.map(c=>`<button class="chip" onclick="selectedCategory='${c.tag}';setView('search')">${c.tag}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><div class="panel-title">지시사항</div><button class="panel-link" onclick="setView('cat_지시사항')">전체 →</button></div>
          ${missedInstr.length
            ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${missedInstr.slice(0,4).map(m=>msgItem(m,true)).join('')}</div>`
            : '<div class="empty-box">오늘 놓친 지시사항이 없습니다.</div>'}
        </div>
        <div class="dashboard-grid-2">
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">해야 할 일 <span style="background:#dc2626;color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px;">내일</span></div>
              <button class="panel-link" onclick="setView('todo')">할일 전체 →</button>

          </div>
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">해야 할 일 <span style="background:#0f766e;color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px;">이번 주</span></div>
              <button class="panel-link" onclick="setView('todo')">할일 전체 →</button>
            </div>

          </div>
        </div>
      </div>
      <aside class="dashboard-right">${calendarCard()}</aside>

// ===== 캘린더 =====
function getCalendarEvents() {
  return messages
    .filter(m=>m.messageDate&&normalizeTag(m.tag)==='일정')
    .map(m=>({id:m.id,date:m.messageDate,title:m.summary,tag:normalizeTag(m.tag),roomName:m.roomName}))
    .sort((a,b)=>a.date.localeCompare(b.date));
}

function getScheduleEvents() {
  const today = todayKey();
  return messages
    .filter(m=>m.messageDate&&m.messageDate>=today&&normalizeTag(m.tag)==='일정')
    .map(m=>({id:m.id,date:m.messageDate,title:m.summary,tag:normalizeTag(m.tag),roomName:m.roomName}))
    .sort((a,b)=>a.date.localeCompare(b.date));
}

function calendarCard() {
  const y=calYear,mo=calMonth;
  const firstDay=new Date(y,mo,1).getDay();
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const events=getCalendarEvents();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(new Date(y,mo,d));
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  return `
    <div class="calendar-card">
      <div class="calendar-head">
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="calNav(-1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px;transition:all 0.15s">‹</button>
          <div class="calendar-title">${y}년 ${monthNames[mo]}</div>
          <button onclick="calNav(1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px;transition:all 0.15s">›</button>
        </div>
        <button onclick="calNav(0)" style="height:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 12px;transition:all 0.15s">오늘</button>
      </div>
      <div class="calendar-grid">
        ${['일','월','화','수','목','금','토'].map(d=>`<div class="day-label">${d}</div>`).join('')}
        ${cells.map((date,i)=>{
          if(!date) return '<div class="cal-cell"></div>';
          const dk=dateKey(date);
          const dayEvents=events.filter(e=>e.date===dk);
          const dayCustom=customEvents.filter(e=>e.date===dk);

          // 저장된 순서 적용해서 합치기
          const orderKey = 'hj3_order_'+dk;
          const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
          let allDayItems = [
            ...dayEvents.map(e=>({type:'msg',id:e.id,tag:e.tag,title:e.title})),
            ...dayCustom.filter(e=>!/^(휴무|근무)/.test(e.title.trim())).map(e=>({type:'custom',id:e.id,tag:e.tag||'일정',title:e.title,memo:e.memo}))
          ];
          if(savedOrder.length) {
            allDayItems.sort((a,b)=>{
              const ai=savedOrder.indexOf(a.id); const bi=savedOrder.indexOf(b.id);
              return (ai===-1?999:ai)-(bi===-1?999:bi);
            });
          }
          const isToday=isSameDay(date,new Date());
          const isSun=i%7===0;
          const holiday = appSettings.showHoliday!==false ? getHoliday(y,mo,date.getDate()) : null;
          const hasCustom=dayCustom.length>0;
          const isOffDay = dayCustom.some(e=>/^휴무/.test(e.title.trim()));
          const isWorkSat = dayCustom.some(e=>/^근무/.test(e.title.trim())) && date.getDay()===6;
          return `<div class="cal-cell ${isToday?'today':''} ${isSun?'sunday':''} ${holiday?'holiday':''} ${isOffDay?'off-day':''} ${hasCustom&&!isOffDay&&!isWorkSat?'has-custom':''}" onclick="handleDayClick('${dk}')">
            <div class="cal-date" style="${isOffDay?'color:#ef4444':''}">
              <span>${date.getDate()}</span>${isOffDay?'<span style="font-size:8px;color:#ef4444;font-weight:900;margin-left:2px;vertical-align:middle">휴무</span>':''}${isWorkSat?'<span style="font-size:8px;color:#0f766e;font-weight:900;margin-left:2px;vertical-align:middle">근무</span>':''}
            </div>
            ${holiday?`<div class="holiday-name">${holiday}</div>`:''}
            ${allDayItems.slice(0,3).map(e=>
              e.type==='msg'
                ? `<span class="cal-event ev-purple" title="${e.title}">${shortTag(e.tag)}</span>`

function toggleTodo(id) {
  todos=todos.map(t=>t.id===id?{...t,done:!t.done,doneAt:!t.done?new Date().toISOString():null}:t);
  save();
  if(currentView==='todo') renderTodoView(document.getElementById('main-content'));
  else if(currentView==='dashboard') renderDashboard(document.getElementById('main-content'));
}

let checkedTodos = new Set();

function renderTodoView(el) {
  const pending=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);
  el.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">미완료 · ${pending.length}건</div>
        <button class="btn-primary" style="font-size:12px;padding:6px 12px;" onclick="completeChecked()">✓ 선택 완료처리</button>
      </div>
      ${pending.map(t=>todoItemCheckable(t)).join('')||'<div class="empty-box"><div class="empty-icon">✅</div><div class="empty-text">미완료 할일이 없습니다.</div></div>'}
    </div>
    <div class="panel"><div class="panel-head"><div class="panel-title">완료 · ${done.length}건</div></div>${done.map(t=>todoItem(t)).join('')||'<div class="empty-box"><div class="empty-icon">🎉</div><div class="empty-text">완료된 할일이 없습니다.</div></div>'}</div>`;
}

function todoItemCheckable(t) {
  const tag=normalizeTag(t.tag);
  const isChecked = checkedTodos.has(t.id);
  return `<div class="item" style="display:flex;gap:10px;align-items:flex-start;">
    <input type="checkbox" style="margin-top:4px;width:16px;height:16px;cursor:pointer;" ${isChecked?'checked':''} onchange="toggleCheck('${t.id}',this.checked)">
    <div style="flex:1;cursor:pointer;" onclick="toggleTodo('${t.id}')">
      <span class="badge ${badgeClass(tag)}">${tagIcon(tag)} ${tag}</span>
      <div class="item-title">${t.title}</div>
      <div class="meta">${[formatDate(t.dueDate),t.roomName].filter(Boolean).join(' · ')}</div>
    </div>
  </div>`;
}

function toggleCheck(id, checked) {
  if(checked) checkedTodos.add(id);
  else checkedTodos.delete(id);
}

function completeChecked() {
  if(checkedTodos.size===0){showToast('완료할 항목을 선택해주세요');return;}
  const count = checkedTodos.size;
  if(!confirm(`선택한 ${count}건을 완료처리할까요?`)) return;
  todos=todos.map(t=>checkedTodos.has(t.id)?{...t,done:true,doneAt:new Date().toISOString()}:t);
  checkedTodos.clear();
  save();
  renderTodoView(document.getElementById('main-content'));
  showToast(`✅ ${count}건 완료처리 완료!`);
}

// ===== 채팅방 뷰 =====
function renderRoomView(el, viewId) {
  const id = viewId.replace('room_','');
  const room = rooms.find(r=>r.id===id);
  if(!room) return;
  const roomMsgs = [...messages.filter(m=>m.roomName===room.name)].sort((a,b)=>new Date(a.messageDate||a.createdAt)-new Date(b.messageDate||b.createdAt));

  // 입력 현황 3개월 캘린더
  const now = new Date();
  const months = [-1, 0, 1].map(offset => {
    let mo = now.getMonth() + offset;
    let y = now.getFullYear();
    if(mo < 0) { mo = 11; y--; }
    if(mo > 11) { mo = 0; y++; }
    return { y, mo };
  });
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 이 채팅방에서 입력된 날짜 수집
  const inputDates = new Set(roomMsgs.map(m => {
    const d = new Date(m.createdAt);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }));

  function renderMiniCal(y, mo) {
    const daysInMonth = new Date(y, mo+1, 0).getDate();
    const firstDay = new Date(y, mo, 1).getDay();
    let cells = '';
    for(let i=0; i<firstDay; i++) cells += '<div></div>';
    for(let d=1; d<=daysInMonth; d++) {
      const dk = `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dk === todayKey();
      const hasInput = inputDates.has(dk);
      const isFuture = dk > todayKey();
      const isSun = (firstDay + d - 1) % 7 === 0;
      cells += `<div onclick="scrollToDate('${dk}')" style="
        width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:1px auto;
        font-size:10px;font-weight:${isToday?'900':'600'};
        background:${hasInput?'#10b981':isToday?'var(--primary)':isFuture?'transparent':'#fee2e2'};
        color:${hasInput?'#fff':isToday?'#fff':isFuture?'var(--soft)':isSun?'#ef4444':'var(--muted)'};
        cursor:${hasInput?'pointer':'default'};
      " title="${dk}${hasInput?' ✅ 입력완료':isFuture?'':' ❌ 미입력'}">${d}</div>`;
    }
    return `
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:800;color:var(--muted);text-align:center;margin-bottom:8px">${y}년 ${monthNames[mo]}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
          ${['일','월','화','수','목','금','토'].map((d,i)=>`<div style="text-align:center;font-size:9px;font-weight:800;color:${i===0?'#ef4444':'var(--soft)'};padding-bottom:3px">${d}</div>`).join('')}
          ${cells}
        </div>
      </div>`;
  }

  // 기간 필터 상태
  const roomFilterKey = 'hj3_roomfilter_' + id;
  const savedFilter = localStorage.getItem(roomFilterKey) || '30';

  el.innerHTML = `
    <!-- 입력 현황 캘린더 -->
    <div class="panel" style="margin-bottom:14px">
      <div class="panel-head">
        <div class="panel-title">📅 입력 현황</div>
        <div style="display:flex;gap:12px;font-size:11px;color:var(--muted)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#10b981;display:inline-block"></span>입력완료</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#fee2e2;display:inline-block"></span>미입력</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
        ${months.map(({y, mo}) => renderMiniCal(y, mo)).join('')}
      </div>
    </div>

    <!-- 태그 필터 + 기간 필터 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div class="chip-row" style="margin-bottom:0;flex:1">
        ${CATEGORIES.map(c=>`<button class="chip" onclick="selectedCategory=selectedCategory==='${c.tag}'?null:'${c.tag}';renderRoomView(document.getElementById('main-content'),'${viewId}')">${c.icon} ${c.tag}</button>`).join('')}
      </div>
      <select onchange="localStorage.setItem('${roomFilterKey}',this.value);renderRoomView(document.getElementById('main-content'),'${viewId}')"
        style="border:1px solid var(--border2);border-radius:8px;padding:6px 10px;font-size:12px;background:var(--card);color:var(--text);cursor:pointer">
        <option value="7" ${savedFilter==='7'?'selected':''}>최근 1주일</option>
        <option value="30" ${savedFilter==='30'?'selected':''}>최근 1개월</option>
        <option value="90" ${savedFilter==='90'?'selected':''}>최근 3개월</option>
        <option value="999" ${savedFilter==='999'?'selected':''}>전체</option>
      </select>
    </div>

    <!-- 날짜별 그룹핑 메시지 -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">${room.name} · ${roomMsgs.length}건</div>
      </div>
      ${(() => {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - Number(savedFilter));
        const filtered = roomMsgs.filter(m => {
          const d = new Date(m.createdAt);
          return d >= cutoff && (!selectedCategory || normalizeTag(m.tag) === selectedCategory);
        });
        if(!filtered.length) return '<div class="empty-box">메시지가 없습니다.</div>';

        // 날짜별 그룹핑
        const groups = {};
        filtered.forEach(m => {
          const d = new Date(m.createdAt);
          const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          if(!groups[dk]) groups[dk] = [];
          groups[dk].push(m);
        });

        const days = ['일','월','화','수','목','금','토'];
        return Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(dk => {
          const d = new Date(dk);
          const label = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
          return `
            <div id="date-group-${dk}" style="margin-bottom:16px">
              <div style="font-size:12px;font-weight:800;color:var(--muted);padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:8px">
                <span>📅 ${label}</span>
                <span style="font-size:11px;font-weight:500;color:var(--soft)">${groups[dk].length}건</span>
              </div>
              ${groups[dk].map(m=>msgItem(m)).join('')}
            </div>`;
        }).join('');
      })()}
    </div>`;
}

// ===== 파싱 =====
function parseAiTable(text,roomName) {
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const rows=[];
  for(const line of lines) {
    if(!line.includes('|')) continue;
    if(/^\|?\s*-+/.test(line)) continue;
    const cells=line.split('|').map(c=>c.trim()).filter(Boolean);
    if(cells.length<2) continue;
    if(cells.some(c=>c.includes('태그'))&&cells.some(c=>c.includes('요약'))) continue;
    const tag=normalizeTag(stripEmoji(cells[0]||'기타'));
    const sender=cells[1]||'';
    const summary=cells[2]||cells[1]||'';
    const todoCell=cells[3]||'';
    const dateCell=cells[4]||summary;
    if(!summary) continue;
    const finalTag=TAGS.includes(tag)?tag:guessTag(summary);
    const extractedDate = extractDateKey(`${summary} ${dateCell}`);
    rows.push({
      tempId:uid(),roomName,tag:finalTag,sender,summary,content:summary,
      messageDate:extractedDate||todayKey(),
      isTodo:/✅|todo|할일|예|yes|y/i.test(todoCell)||shouldBeTodo(summary,finalTag),
    });
  }
  return rows;
}

function parseRawKakao(text,roomName) {
  return text.split('\n').map(l=>l.trim()).filter(l=>l.length>=4).map(line=>{
    const match=line.match(/^(.{1,18}?)[\s:：-]+(.+)$/);
    const sender=match?match[1].replace(/\[|\]/g,'').trim():'';
    const body=match?match[2].trim():line;
    const tag=guessTag(body);
    return {
      tempId:uid(),roomName,tag,sender,
      summary:body.length>70?body.slice(0,70)+'...':body,
      content:body,messageDate:extractDateKey(body),isTodo:shouldBeTodo(body,tag),
    };
  });
}

function guessTag(text) {
  if(/공지|전달|안내|조회|회의/.test(text)) return '공지사항';
  if(/기준|시방|도면|승인도|상세도|KCS|KS|규격/.test(text)) return '시공기준';
  if(/자재|발주|반입|입고|납품|수량|출고/.test(text)) return '자재발주';
  if(/품질|검측|시험|검사|사진대장|확인서/.test(text)) return '품질관리';
  if(/안전|난간|조회|위험|보호구|작업허가|위험성/.test(text)) return '안전관리';
  if(/하자|보수|누수|균열|들뜸|탈락|AS|A\/S/.test(text)) return '하자보수';
  if(/내일|모레|오늘|이번\s*주|다음\s*주|\d{1,2}\/\d{1,2}|\d{1,2}월\s*\d{1,2}일|오전|오후/.test(text)) return '일정';
  if(/해주세요|바랍니다|확인|공유|정리|보고|조치/.test(text)) return '지시사항';
  return '기타';
}

function shouldBeTodo(text,tag) {
  if(['지시사항','자재발주','품질관리','안전관리','하자보수'].includes(normalizeTag(tag))) return true;
  return /까지|요청|해주세요|바랍니다|확인|공유|정리|보고|조치/.test(text);
}

function stripEmoji(v) { return String(v||'').replace(/[📋📐🧱🧪⚠️🔧📅📢📌✅]/g,'').trim(); }

function extractDateKey(text) {
  const now=new Date();
  if(/내일/.test(text)) return addDaysKey(1);
  if(/모레/.test(text)) return addDaysKey(2);
  const slash=text.match(/(\d{1,2})\/(\d{1,2})/);
  if(slash) return dateKey(new Date(now.getFullYear(),Number(slash[1])-1,Number(slash[2])));
  const kor=text.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if(kor) return dateKey(new Date(now.getFullYear(),Number(kor[1])-1,Number(kor[2])));
  const iso=text.match(/(20\d{2})-(\d{1,2})-(\d{1,2})/);
  if(iso) return dateKey(new Date(Number(iso[1]),Number(iso[2])-1,Number(iso[3])));
  return null;
}

function exportBackup() {
  const data={version:2,exportedAt:new Date().toISOString(),rooms,messages,todos,starredRooms};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`현장톡_백업_${todayKey()}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 백업 완료!');
}

function importBackup() {
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file) return;
    const text=await file.text();
    try{
      const data=JSON.parse(text);
      if(!data.rooms||!data.messages){showToast('❌ 올바른 백업 파일이 아니에요');return;}
      if(!confirm(`복원할까요?\n메시지 ${data.messages.length}건, 할일 ${data.todos?.length||0}건`)) return;
      rooms=data.rooms||[];messages=data.messages||[];todos=data.todos||[];starredRooms=data.starredRooms||[];
      save();setView('dashboard');showToast('✅ 복원 완료!');
    }catch{showToast('❌ 파일 읽기 오류');}
  };
  input.click();
}

function exportCSV() {
  if(!messages.length){showToast('내보낼 메시지가 없어요');return;}
  const headers=['태그','채팅방','발신자','요약','날짜','할일여부'];
  const rows=messages.map(m=>[m.tag||'',m.roomName||'',m.sender||'',m.summary||'',m.messageDate||'',m.isTodo?'할일':'']);
  const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`현장톡_${todayKey()}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast('📊 엑셀 파일 다운로드 완료!');
}

function applySpecificDate() {
  const dateStr = document.getElementById('specific-date-input').value;
  if(!dateStr) { showToast('날짜를 선택해주세요'); return; }
  const sharedText = document.getElementById('date-filter-modal').dataset.text;
  closeDateFilterModal();

  const target = new Date(dateStr);
  const lines = sharedText.split('\n');
  let currentDate = null;
  const filteredLines = [];

  for(const line of lines) {
    const dateMatch = line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(dateMatch) {
      currentDate = new Date(Number(dateMatch[1]), Number(dateMatch[2])-1, Number(dateMatch[3]));
    }
    if(currentDate && currentDate.toDateString() === target.toDateString()) {
      filteredLines.push(line);
    }
  }

  const filtered = filteredLines.join('\n').trim();
  setFilteredText(filtered, `${dateStr} 대화`);
}

function applyDateRange() {
  const start = document.getElementById('range-start-input').value;
  const end = document.getElementById('range-end-input').value;
  if(!start||!end) { showToast('시작일과 종료일을 선택해주세요'); return; }
  const sharedText = document.getElementById('date-filter-modal').dataset.text;
  closeDateFilterModal();

  const startDate = new Date(start);
  const endDate = new Date(end);
  endDate.setHours(23,59,59,999);
  const lines = sharedText.split('\n');
  let currentDate = null;
  const filteredLines = [];

  for(const line of lines) {
    const dateMatch = line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(dateMatch) {
      currentDate = new Date(Number(dateMatch[1]), Number(dateMatch[2])-1, Number(dateMatch[3]));
    }
    if(currentDate && currentDate >= startDate && currentDate <= endDate) {
      filteredLines.push(line);
    }
  }

  const filtered = filteredLines.join('\n').trim();
  setFilteredText(filtered, `${start} ~ ${end} 대화`);
}

function setFilteredText(filtered, label) {
  const roomSelect = document.getElementById('input-room');
  if(roomSelect && selectedRoomName) {
    for(let i=0; i<roomSelect.options.length; i++) {
      if(roomSelect.options[i].value === selectedRoomName) {
        roomSelect.selectedIndex = i;
        break;
      }
    }
  }
  const textarea = document.getElementById('input-text');
  if(textarea) {
    textarea.value = filtered || '';
    document.getElementById('input-count').textContent = `${(filtered||'').length}자 · 미리보기 0건`;
    if(filtered) {
      showToast(`📨 ${selectedRoomName} · ${label} 불러왔어요!`);
    } else {
      showToast('해당 날짜 대화가 없어요');
    }
  }
}

function applyDateFilter(days) {
  const sharedText = document.getElementById('date-filter-modal').dataset.text;
  closeDateFilterModal();

  let filtered = sharedText;

  if(days !== 'all') {
    const lines = sharedText.split('\n');
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - Number(days));
    cutoff.setHours(0,0,0,0);

    let currentDate = null;
    const filteredLines = [];

    for(const line of lines) {
      const dateMatch = line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
      if(dateMatch) {
        currentDate = new Date(Number(dateMatch[1]), Number(dateMatch[2])-1, Number(dateMatch[3]));
      }
      if(!currentDate || currentDate >= cutoff) {
        filteredLines.push(line);
      }
    }
    filtered = filteredLines.join('\n').trim();
  }

  const label = days==='all'?'전체':days+'일치';
  setFilteredText(filtered, label);
}
async function aiClassify() {
  const text = document.getElementById('input-text').value.trim();
  const roomName = document.getElementById('input-room').value;
  if(!text) { showError('분류할 대화 내용을 붙여넣어 주세요.'); return; }

  // 버튼 로딩 상태
  const btn = document.querySelector('button[onclick="aiClassify()"]');
  const origText = btn.textContent;
  btn.textContent = '⏳ 분류 중...';
  btn.disabled = true;
  hideError();

  try {
    const response = await fetch('https://rjipklyccmwqodgdpbph.supabase.co/functions/v1/classify', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      },
      body: JSON.stringify({ text, roomName }),
    });

    if(!response.ok) throw new Error('서버 오류: ' + response.status);

    const raw = await response.text();
    const clean = raw.replace(/```json|```/g, '').trim();
    const items = JSON.parse(clean);

    if(!Array.isArray(items) || items.length===0) {
      showError('분류 결과가 없어요. 대화 내용을 확인해주세요.');
      return;
    }

    previewItems = items.map(item => ({
      tempId: uid(),
      roomName,
      tag: normalizeTag(item.tag || '기타'),
      sender: item.sender || '',
      summary: item.summary || item.content || '',
      content: item.content || item.summary || '',
      messageDate: item.messageDate || null,
      isTodo: Boolean(item.isTodo),
    }));

    renderPreviewList();
    document.getElementById('input-count').textContent = `${text.length}자 · AI 분류 ${previewItems.length}건`;
    showToast(`✨ AI가 ${previewItems.length}건 분류했어요!`);

  } catch(e) {
    showError('AI 분류 실패: ' + e.message);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

function dropCard(e, target) {
  if(dragSrc===target) return;
  const cards = [...appSettings.dashboardCards];
  const from = cards.indexOf(dragSrc);

  cards.splice(from,1);

  // 메시지 일정 + 직접 추가 일정 합쳐서 순서 관리
  const allItems = [
    ...dayMsgs.map(m=>({type:'msg', id:m.id, tag:normalizeTag(m.tag), title:m.summary, sub:m.roomName+(m.sender?' · '+m.sender:''), data:m})),
    ...dayCustom.map(e=>({type:'custom', id:e.id, tag:normalizeTag(e.tag||'일정'), title:e.title, sub:e.memo||'', data:e}))
  ];

  // 저장된 순서 적용
  const orderKey = 'hj3_order_'+dateStr;
  const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(savedOrder.length) {
    allItems.sort((a,b)=>{
      const ai = savedOrder.indexOf(a.id);
      const bi = savedOrder.indexOf(b.id);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  }

  allItems.forEach((item,i)=>{
    const tag = item.tag;
    html+=`<div class="day-drag-item" draggable="true" data-idx="${i}"
      ondragstart="onDayDragStart(event,${i})"
      ondragover="onDayDragOver(event,${i},'${dateStr}')"
      ondrop="onDayDrop(event,${i},'${dateStr}')"
      ondragend="onDayDragEnd(event,'${dateStr}')"
      style="margin-bottom:8px;border:1px solid var(--border);border-left:3px solid ${item.type==='custom'?'#3b82f6':'var(--border2)'};border-radius:8px;padding:12px;background:var(--surface);display:flex;align-items:flex-start;gap:8px;cursor:grab;transition:opacity 0.15s">
      <span style="font-size:14px;color:var(--soft);margin-top:2px">⠿</span>
      <div style="flex:1;cursor:pointer" onclick="closeDayModal();${item.type==='custom'?`openEditEventModal('${item.id}')`:`openEditMsgEvent('${item.id}')`}">
        <span class="badge ${badgeClass(tag)}">${tagIcon(tag)} ${tag} ✏️</span>
        <div class="item-title" style="font-size:13px;margin-top:4px">${item.title}</div>
        ${item.sub?`<div class="meta">${item.sub}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('day-modal-list').innerHTML = html;
  document.getElementById('day-modal-date').value = dateStr;
  document.getElementById('day-modal').style.display = 'flex';
}

function closeDayModal() {
  document.getElementById('day-modal').style.display = 'none';
}

let dragEventId = null;
let dragFromIdx = null;

function onDayDragStart(e, idx) {
  dragFromIdx = idx;
  e.target.style.opacity = '0.4';
}

function onDayDragOver(e, idx, dateStr) {
  e.preventDefault();
  if(dragFromIdx === null || dragFromIdx === idx) return;
  // 시각적 피드백
  document.querySelectorAll('.day-drag-item').forEach((el,i)=>{
    el.style.borderTop = i===idx ? '2px solid #3b82f6' : '';
  });
}

function onDayDragEnd(e, dateStr) {
  e.target.style.opacity = '1';
  document.querySelectorAll('.day-drag-item').forEach(el=>{
    el.style.borderTop = '';
    el.style.opacity = '1';
  });
  // drop이 처리됨
}

function onDayDrop(e, toIdx, dateStr) {
  e.preventDefault();
  if(dragFromIdx===null || dragFromIdx===toIdx) { dragFromIdx=null; return; }

  // 해당 날짜 모든 아이템 수집
  const dayMsgs = messages.filter(m=>m.messageDate===dateStr&&normalizeTag(m.tag)==='일정');
  const dayCustom = customEvents.filter(ev=>ev.date===dateStr);
  let allIds = [
    ...dayMsgs.map(m=>m.id),
    ...dayCustom.map(ev=>ev.id)
  ];

  // 저장된 순서 있으면 적용
  const orderKey = 'hj3_order_'+dateStr;
  const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(savedOrder.length) {
    allIds.sort((a,b)=>{
      const ai=savedOrder.indexOf(a); const bi=savedOrder.indexOf(b);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  }

  // 순서 변경
  const moved = allIds.splice(dragFromIdx,1)[0];
  allIds.splice(toIdx,0,moved);
  dragFromIdx = null;

  // localStorage에 저장
  localStorage.setItem(orderKey, JSON.stringify(allIds));

  // customEvents 배열 순서도 반영
  const customOrder = allIds.filter(id => customEvents.find(e=>e.id===id));
  customEvents.sort((a,b)=>{
    const ai = customOrder.indexOf(a.id);
    const bi = customOrder.indexOf(b.id);
    if(ai===-1&&bi===-1) return 0;
    if(ai===-1) return 1;
    if(bi===-1) return -1;
    return ai-bi;
  });

  save();
  handleDayClick(dateStr);
  // 캘린더 셀도 즉시 갱신
  const el = document.getElementById('main-content');
  if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='dashboard') renderDashboard(el);
}

function saveCustomEvent() {
  const title = document.getElementById('event-title-input').value.trim();
  const date = document.getElementById('event-date-input').value;
  const tag = document.getElementById('event-tag-input').value;
  const memo = document.getElementById('event-memo-input').value.trim();
  if(!title) { showToast('제목을 입력해주세요'); return; }
  if(!date) { showToast('날짜를 선택해주세요'); return; }
  if(editingEventId) {
    customEvents = customEvents.map(e=>e.id===editingEventId?{...e,title,date,tag,memo}:e);
    showToast('✅ 일정이 수정됐어요!');
  } else {
    customEvents.push({id:uid(),title,date,tag,memo,createdAt:new Date().toISOString()});
    showToast('✅ 일정이 추가됐어요!');
  }
  save();
  closeEventModal();
  const el = document.getElementById('main-content');
  if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='dashboard') renderDashboard(el);
}

  if(!editingEventId) return;

  const delId = editingEventId;
  customEvents = customEvents.filter(e=>e.id!==delId);
  save();
  // Supabase에서도 삭제
  sbFetch('custom_events', 'DELETE', null, `?id=eq.${delId}`).catch(e=>console.error(e));
  closeEventModal();
  showToast('🗑️ 일정이 삭제됐어요');
  const el = document.getElementById('main-content');
  if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='dashboard') renderDashboard(el);
}

// ===== 구글 로그인 =====
const ALLOWED_EMAIL = 'nacbong@gmail.com';

// ✅ 수정된 함수 - 직접 URL 리디렉트
function loginWithGoogle() {
  const redirectTo = window.location.origin + window.location.pathname;
  window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
}

async function checkAuth() {
  // URL 해시에서 access_token 확인 (OAuth 콜백)
  const hash = window.location.hash;
  if(hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if(accessToken) {
      localStorage.setItem('hj_token', accessToken);
      if(refreshToken) localStorage.setItem('hj_refresh_token', refreshToken);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }

  const token = localStorage.getItem('hj_token');
  if(!token) return false;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    if(!res.ok) {
      // 토큰 만료 → 자동갱신 시도
      const refreshed = await refreshToken();
      if(!refreshed) { localStorage.removeItem('hj_token'); return false; }
      return await checkAuth();
    }
    const user = await res.json();
    if(user.email === ALLOWED_EMAIL) {
      // 45분마다 자동갱신
      setTimeout(autoRefreshToken, 45 * 60 * 1000);
      return true;
    } else {
      alert(`접근 권한이 없습니다.\n(${user.email})`);
      localStorage.removeItem('hj_token');
      localStorage.removeItem('hj_refresh_token');
      return false;
    }
  } catch(e) { return false; }
}

async function refreshToken() {
  const refresh = localStorage.getItem('hj_refresh_token');
  if(!refresh) return false;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refresh })
    });
    if(!res.ok) return false;
    const data = await res.json();
    if(data.access_token) {
      localStorage.setItem('hj_token', data.access_token);
      if(data.refresh_token) localStorage.setItem('hj_refresh_token', data.refresh_token);
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function autoRefreshToken() {
  const ok = await refreshToken();
  if(ok) {
    // 갱신 성공 → 45분 후 다시 갱신
    setTimeout(autoRefreshToken, 45 * 60 * 1000);
    console.log('✅ 토큰 자동갱신 완료');
  }
}
